<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Lend & Borrow Tracker</title>

<style>
:root{
--body-bg:#dfe6e9;--bg-color:#f8f9fa;--text-main:#2d3436;--text-muted:#636e72;
--lend-color:#0984e3;--borrow-color:#d63031;--net-color:#00b894;
--card-bg:#ffffff;--danger:#ff7675;--input-bg:#f8f9fa;--input-border:#dfe6e9;
--add-btn-bg:#f0f3f5;--border-line:#eee;
}

body.dark-theme{
--body-bg:#000;--bg-color:#121212;--text-main:#f5f6fa;--text-muted:#a4b0be;
--card-bg:#1e1e1e;--input-bg:#2d2d2d;--input-border:#444;
--add-btn-bg:#2d2d2d;--border-line:#333;
--lend-color:#74b9ff;--borrow-color:#ff7675;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

body{
background:var(--body-bg);
display:flex;justify-content:center;height:100vh;overflow:hidden;
color:var(--text-main);transition:.4s;
}

#app-container{
width:100%;max-width:480px;height:100%;
background:var(--bg-color);
display:flex;flex-direction:column;overflow:hidden;
animation:appFade .5s ease;
}

@keyframes appFade{
from{opacity:0;transform:scale(.98);}
to{opacity:1;transform:scale(1);}
}

header{
height:70px;display:flex;align-items:center;justify-content:center;
position:relative;font-weight:600;font-size:1.2rem;
background:var(--card-bg);
}

.header-left-btn,.header-add-btn{
position:absolute;border:none;background:none;cursor:pointer;
font-size:1.5rem;color:var(--text-main);
}

.header-left-btn{left:15px;}
.header-add-btn{
right:15px;font-size:1.8rem;display:none;
transition:transform .2s ease;
}

.header-add-btn:hover{transform:rotate(90deg) scale(1.05);}
.header-add-btn:active{transform:scale(.9);}

.page-wrapper{flex:1;position:relative;overflow:hidden;}

.page{
position:absolute;inset:0;
background:var(--bg-color);
transform:translateX(100%) scale(.98);
opacity:0;
transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .3s ease;
overflow-y:auto;
display:none;
}

.page.active{
display:flex;flex-direction:column;
transform:translateX(0) scale(1);
opacity:1;
}

.page.prev{
display:flex;
transform:translateX(-20%) scale(.96);
opacity:.6;
}

.net-balance{
margin:20px;padding:25px;text-align:center;
background:var(--net-color);color:white;border-radius:16px;
}

.net-balance h2{font-size:2.2rem;margin-top:5px;}

.dashboard-cards{display:flex;gap:15px;padding:0 20px;}

.card{
flex:1;background:var(--card-bg);padding:20px;border-radius:16px;
text-align:center;cursor:pointer;
transition:transform .2s ease,box-shadow .2s ease;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.card:active{transform:scale(.97);}

.card.lend h3{color:var(--lend-color);}
.card.borrow h3{color:var(--borrow-color);}

.category-summary,.person-summary{
background:var(--card-bg);padding:20px;text-align:center;
border-bottom:1px solid var(--border-line);
}

.list-container{padding:20px;}

.list-item{
background:var(--card-bg);padding:15px;margin-bottom:10px;
border-radius:12px;display:flex;justify-content:space-between;align-items:center;
opacity:0;transform:translateY(10px);
animation:fadeSlideUp .4s ease forwards;
}

@keyframes fadeSlideUp{
to{opacity:1;transform:translateY(0);}
}

.amount{font-weight:700;}
.amount.lend{color:var(--lend-color);}
.amount.borrow{color:var(--borrow-color);}
.amount.return{color:var(--net-color);}

.modal-overlay{
position:absolute;inset:0;background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:flex-end;
}

.modal-overlay.active{display:flex;}

.modal-content{
width:100%;background:var(--card-bg);
border-radius:24px 24px 0 0;padding:25px;
transform:translateY(100%);
transition:transform .45s cubic-bezier(.34,1.56,.64,1);
}

.modal-overlay.active .modal-content{transform:translateY(0);}

.form-group{margin-bottom:12px;}
.form-group input{
width:100%;padding:10px;border:1px solid var(--input-border);
border-radius:10px;background:var(--input-bg);color:var(--text-main);
}

.btn-submit{
width:100%;padding:14px;margin-top:10px;
border:none;border-radius:10px;font-weight:600;cursor:pointer;
background:#555;color:white;
}

.empty-state{text-align:center;color:var(--text-muted);}
</style>
</head>

<body>

<div id="app-container">

<header>
<button class="header-left-btn" id="backBtn" onclick="goBack()">←</button>
<button class="header-left-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
<span id="header-title">Dashboard</span>
<button class="header-add-btn" id="headerAddBtn" onclick="openModal()">+</button>
</header>

<div class="page-wrapper">

<div id="page-home" class="page active">
<div class="net-balance">
<p>Net Balance</p>
<h2 id="total-net">₹0</h2>
</div>
<div class="dashboard-cards">
<div class="card lend" onclick="navigate('page-lend','Lend')">
<p>Total Lend</p><h3 id="total-lend">₹0</h3>
</div>
<div class="card borrow" onclick="navigate('page-borrow','Borrow')">
<p>Total Borrowed</p><h3 id="total-borrow">₹0</h3>
</div>
</div>
</div>

<div id="page-lend" class="page">
<div class="category-summary">
<p>Total Lend</p><h2 id="tab-total-lend" class="amount lend">₹0</h2>
</div>
<div class="list-container" id="lend-list"></div>
</div>

<div id="page-borrow" class="page">
<div class="category-summary">
<p>Total Borrowed</p><h2 id="tab-total-borrow" class="amount borrow">₹0</h2>
</div>
<div class="list-container" id="borrow-list"></div>
</div>

</div>
</div>

<script>
let appData=JSON.parse(localStorage.getItem('financeTrackerData'))||{lend:[],borrow:[]};
let historyStack=['page-home'];

function formatCurrency(a){
return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(a);
}

function animateValue(el,start,end,duration=600){
let startTime=null;
function step(timestamp){
if(!startTime)startTime=timestamp;
let progress=Math.min((timestamp-startTime)/duration,1);
let value=Math.floor(progress*(end-start)+start);
el.innerText=formatCurrency(value);
if(progress<1)requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function calculateBalance(arr){
return arr.reduce((t,p)=>{
return t+p.transactions.reduce((s,x)=>x.type==='primary'?s+x.amount:s-x.amount,0);
},0);
}

function renderDashboard(){
let lend=calculateBalance(appData.lend);
let borrow=calculateBalance(appData.borrow);
animateValue(document.getElementById('total-lend'),0,lend);
animateValue(document.getElementById('total-borrow'),0,borrow);
animateValue(document.getElementById('total-net'),0,Math.abs(lend-borrow));
document.getElementById('tab-total-lend').innerText=formatCurrency(lend);
document.getElementById('tab-total-borrow').innerText=formatCurrency(borrow);
}

function renderList(category){
let list=document.getElementById(category+'-list');
list.innerHTML='';
if(!appData[category].length){
list.innerHTML='<div class="empty-state">No entries yet</div>';return;}
appData[category].forEach((p,index)=>{
let bal=p.transactions.reduce((s,x)=>x.type==='primary'?s+x.amount:s-x.amount,0);
list.innerHTML+=`
<div class="list-item" style="animation-delay:${index*60}ms">
<span>${p.name}</span>
<span class="amount ${category}">${formatCurrency(bal)}</span>
</div>`;
});
}

function navigate(id,title){
let current=historyStack[historyStack.length-1];
document.getElementById(current).classList.remove('active');
document.getElementById(id).classList.add('active');
historyStack.push(id);
document.getElementById('header-title').innerText=title;
if(id==='page-lend'){renderList('lend');}
if(id==='page-borrow'){renderList('borrow');}
}

function goBack(){
if(historyStack.length<=1)return;
let current=historyStack.pop();
document.getElementById(current).classList.remove('active');
let prev=historyStack[historyStack.length-1];
document.getElementById(prev).classList.add('active');
document.getElementById('header-title').innerText='Dashboard';
}

renderDashboard();
</script>

</body>
</html>
